{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}{{ settings_obj.meta_title }}{% endblock %}</title>
<meta name="description" content="{{ settings_obj.site_name }}">
<meta name="keywords" content="">
{% if settings_obj.favicon %}
  <link rel="icon" href="{{ settings_obj.favicon.url }}" type="image/png">
  <link rel="apple-touch-icon" href="{{ settings_obj.favicon.url }}">
{% else %}
  <link rel="icon" href="{% static 'images/default-favicon.png' %}">
{% endif %}
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/css/intlTelInput.css">
<style>
  .site-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    color: #cbd5e1;
    font-size: 13px;
    z-index: 50;
  }

  .footer-container {
    max-width: 1200px;
    margin: auto;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .site-footer a {
    color: #e5e7eb;
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .site-footer a:hover {
    color: #facc15; /* premium gold */
  }

  .footer-center {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dot {
    opacity: 0.5;
  }

  .footer-right {
    white-space: nowrap;
  }

  .muted {
    opacity: 0.7;
  }

  /* MOBILE RESPONSIVE */
  @media (max-width: 768px) {
    .footer-container {
      flex-direction: column;
      text-align: center;
      gap: 6px;
    }
  }

  .iti--separate-dial-code .iti__selected-dial-code {
    margin-left: 8px;
  }
  .iti {
    width: 100%;
  }
  .iti input,
  .iti input[type=tel] {
    width: 100%;
    height: 44px;              /* 🔥 fix height */
    padding-left: 90px !important; /* 🔥 space for flag + code */
    padding-right: 12px;
    font-size: 14px;
    border-radius: 6px;
    border: 1px solid #d1d5db; /* gray-300 */
    outline: none;
  }
  .iti__flag-container {
    left: 8px;
  }
  .iti__selected-flag {
    height: 100%;
    padding: 0 8px;
    display: flex;
    align-items: center;
  }
  .iti__arrow {
    margin-left: 6px;
  }
  .iti input:focus {
    border-color: #fb923c; /* orange-400 */
    box-shadow: 0 0 0 2px rgba(251,146,60,0.3);
  }
  .animate-zoom-in { animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
</style>

  <!-- Google Tag Manager -->
  <script>
    (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-{{ settings_obj.googletagmanager }}');
  </script>
  
  <!-- End Google Tag Manager -->
</head>

<body>

   <!-- Google Tag Manager (noscript) -->
<noscript>
  <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-{{ settings_obj.googletagmanager }}"
  height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>
<!-- End Google Tag Manager (noscript) -->

{% include 'includes/header.html' %}

{% block content %}{% endblock %}

{% include 'includes/popups.html' %}




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static '' %}projects/assets/js/main.js"></script>
</body>
</html>
